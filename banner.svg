<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Eya Nemer — GitHub Profile Header</title>
<desc>Animated profile header for Eya Nemer, Full Stack &amp; IoT Developer</desc>
<defs>
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes drift { 0%{transform:translate(0,0)} 25%{transform:translate(6px,-4px)} 50%{transform:translate(-4px,6px)} 75%{transform:translate(5px,3px)} 100%{transform:translate(0,0)} }
    @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }
    @keyframes slide-in { from{opacity:0;transform:translateX(-18px)} to{opacity:1;transform:translateX(0)} }
    @keyframes badge-pop { 0%{transform:scale(0.7);opacity:0} 80%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .star { animation: twinkle 3s ease-in-out infinite; }
    .s0{animation-delay:0s} .s1{animation-delay:0.4s} .s2{animation-delay:0.8s} .s3{animation-delay:1.2s}
    .s4{animation-delay:1.6s} .s5{animation-delay:2s} .s6{animation-delay:2.4s} .s7{animation-delay:0.2s}
    .s8{animation-delay:0.6s} .s9{animation-delay:1s} .s10{animation-delay:1.8s} .s11{animation-delay:2.2s}
    .float-group { animation: float 4s ease-in-out infinite; }
    .drift1 { animation: drift 9s ease-in-out infinite; }
    .drift2 { animation: drift 12s ease-in-out infinite reverse; }
    .drift3 { animation: drift 7s ease-in-out infinite 2s; }
    .spin-ring { transform-origin: 340px 100px; animation: spin 20s linear infinite; }
    .line1{animation:slide-in 0.6s 0.3s both}
    .line2{animation:slide-in 0.6s 0.6s both}
    .line3{animation:slide-in 0.6s 0.9s both}
    .line4{animation:slide-in 0.6s 1.1s both}
    .line5{animation:slide-in 0.6s 1.3s both}
    .badge{animation:badge-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
    .b1{animation-delay:0.2s} .b2{animation-delay:0.4s} .b3{animation-delay:0.6s}
    .b4{animation-delay:0.8s} .b5{animation-delay:1.0s} .b6{animation-delay:1.2s}
    .b7{animation-delay:1.4s} .b8{animation-delay:1.6s} .b9{animation-delay:1.8s}
    .b10{animation-delay:2.0s} .b11{animation-delay:2.2s} .b12{animation-delay:2.4s}
    .cursor{animation:blink 1s step-end infinite}
    .orbit1 { transform-origin: 340px 100px; animation: spin 6s linear infinite; }
    .orbit2 { transform-origin: 340px 100px; animation: spin 10s linear infinite reverse; }
  </style>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d0d2b"/>
    <stop offset="100%" stop-color="#1a1040"/>
  </linearGradient>
  <linearGradient id="glow-purple" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7F77DD"/>
    <stop offset="100%" stop-color="#D4537E"/>
  </linearGradient>
  <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e1654" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#140f3a" stop-opacity="0.95"/>
  </linearGradient>
  <radialGradient id="avatar-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="680" height="480" fill="url(#sky)" rx="12"/>

<!-- Stars -->
<circle class="star s0" cx="60" cy="30" r="1.5" fill="#ffffff"/>
<circle class="star s1" cx="120" cy="18" r="2" fill="#B5D4F4"/>
<circle class="star s2" cx="200" cy="40" r="1" fill="#ffffff"/>
<circle class="star s3" cx="310" cy="15" r="1.5" fill="#CECBF6"/>
<circle class="star s4" cx="420" cy="25" r="2" fill="#ffffff"/>
<circle class="star s5" cx="520" cy="35" r="1" fill="#B5D4F4"/>
<circle class="star s6" cx="600" cy="20" r="1.5" fill="#ffffff"/>
<circle class="star s7" cx="650" cy="45" r="1" fill="#CECBF6"/>
<circle class="star s8" cx="80" cy="60" r="1" fill="#ffffff"/>
<circle class="star s9" cx="560" cy="55" r="1.5" fill="#ffffff"/>
<circle class="star s10" cx="390" cy="50" r="1" fill="#B5D4F4"/>
<circle class="star s11" cx="170" cy="22" r="2" fill="#ffffff"/>

<!-- Drifting blobs -->
<circle class="drift1" cx="80" cy="200" r="50" fill="#534AB7" fill-opacity="0.12"/>
<circle class="drift2" cx="600" cy="160" r="65" fill="#D4537E" fill-opacity="0.10"/>
<circle class="drift3" cx="340" cy="320" r="80" fill="#1D9E75" fill-opacity="0.07"/>

<!-- Avatar group -->
<g class="float-group">
  <circle cx="340" cy="100" r="62" fill="url(#avatar-glow)"/>
  <circle cx="340" cy="100" r="48" fill="#2d2168" stroke="#7F77DD" stroke-width="2.5"/>
  <text x="340" y="116" text-anchor="middle" font-size="40" font-family="sans-serif">👩‍💻</text>

  <!-- Spinning dashed ring -->
  <circle class="spin-ring" cx="340" cy="100" r="54" fill="none" stroke="#7F77DD" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4 3"/>

  <!-- Orbit dot 1 - Flutter blue -->
  <g class="orbit1">
    <circle cx="340" cy="46" r="7" fill="#02569B" stroke="#0d0d2b" stroke-width="2"/>
    <text x="340" y="50" text-anchor="middle" font-size="8" fill="#54C5F8" font-family="sans-serif" font-weight="bold">F</text>
  </g>

  <!-- Orbit dot 2 - Python blue -->
  <g class="orbit2">
    <circle cx="340" cy="28" r="6" fill="#3776AB" stroke="#0d0d2b" stroke-width="2"/>
    <text x="340" y="32" text-anchor="middle" font-size="7" fill="#FFD343" font-family="sans-serif" font-weight="bold">Py</text>
  </g>
</g>

<!-- Card -->
<rect x="40" y="175" width="600" height="260" rx="16" fill="url(#card-bg)" stroke="#534AB7" stroke-width="1" stroke-opacity="0.6"/>

<!-- Name & subtitle -->
<g class="line1">
  <text x="340" y="215" text-anchor="middle" font-size="22" font-weight="500" fill="#EEEDFE" font-family="sans-serif">Eya Nemer</text>
</g>
<g class="line2">
  <text x="340" y="240" text-anchor="middle" font-size="12" fill="#AFA9EC" font-family="sans-serif">Full Stack Developer · IoT · AI · Mobile</text>
</g>

<line x1="100" y1="252" x2="580" y2="252" stroke="#534AB7" stroke-width="0.5" stroke-opacity="0.5"/>

<!-- Bio lines -->
<g class="line3">
  <text x="88" y="274" font-size="12" fill="#9FE1CB" font-family="sans-serif">🚀 Full Stack Developer (Web, Mobile &amp; IoT)</text>
</g>
<g class="line4">
  <text x="88" y="294" font-size="12" fill="#CECBF6" font-family="sans-serif">🎓 M2 — IoT Services · ISET Mahdia</text>
</g>
<g class="line5">
  <text x="88" y="314" font-size="12" fill="#F4C0D1" font-family="sans-serif">📱 Mobile Developer · Flutter &amp; Dart</text>
</g>

<line x1="100" y1="328" x2="580" y2="328" stroke="#534AB7" stroke-width="0.5" stroke-opacity="0.5"/>

<!-- Badges row 1 -->
<g class="badge b1"><rect x="52" y="338" width="68" height="22" rx="6" fill="#20232A" stroke="#61DAFB" stroke-width="0.8"/><text x="86" y="353" text-anchor="middle" font-size="10" fill="#61DAFB" font-family="sans-serif">React</text></g>
<g class="badge b2"><rect x="126" y="338" width="68" height="22" rx="6" fill="#1a3d1a" stroke="#43853D" stroke-width="0.8"/><text x="160" y="353" text-anchor="middle" font-size="10" fill="#6ec26e" font-family="sans-serif">Node.js</text></g>
<g class="badge b3"><rect x="200" y="338" width="68" height="22" rx="6" fill="#3a0a06" stroke="#FF2D20" stroke-width="0.8"/><text x="234" y="353" text-anchor="middle" font-size="10" fill="#FF6B5B" font-family="sans-serif">Laravel</text></g>
<g class="badge b4"><rect x="274" y="338" width="68" height="22" rx="6" fill="#12213a" stroke="#3776AB" stroke-width="0.8"/><text x="308" y="353" text-anchor="middle" font-size="10" fill="#85B7EB" font-family="sans-serif">Python</text></g>
<g class="badge b5"><rect x="348" y="338" width="68" height="22" rx="6" fill="#001535" stroke="#02569B" stroke-width="0.8"/><text x="382" y="353" text-anchor="middle" font-size="10" fill="#54C5F8" font-family="sans-serif">Flutter</text></g>
<g class="badge b6"><rect x="422" y="338" width="52" height="22" rx="6" fill="#001535" stroke="#0175C2" stroke-width="0.8"/><text x="448" y="353" text-anchor="middle" font-size="10" fill="#80CBFF" font-family="sans-serif">Dart</text></g>
<g class="badge b7"><rect x="480" y="338" width="60" height="22" rx="6" fill="#1a0a0a" stroke="#00979D" stroke-width="0.8"/><text x="510" y="353" text-anchor="middle" font-size="10" fill="#00C5CC" font-family="sans-serif">Arduino</text></g>
<g class="badge b8"><rect x="546" y="338" width="52" height="22" rx="6" fill="#111" stroke="#888" stroke-width="0.8"/><text x="572" y="353" text-anchor="middle" font-size="10" fill="#ccc" font-family="sans-serif">ESP32</text></g>

<!-- Badges row 2 -->
<g class="badge b9"><rect x="52" y="368" width="68" height="22" rx="6" fill="#1a0a1a" stroke="#A22846" stroke-width="0.8"/><text x="86" y="383" text-anchor="middle" font-size="10" fill="#F4628A" font-family="sans-serif">Rasp. Pi</text></g>
<g class="badge b10"><rect x="126" y="368" width="52" height="22" rx="6" fill="#001830" stroke="#0089D6" stroke-width="0.8"/><text x="152" y="383" text-anchor="middle" font-size="10" fill="#4DB8FF" font-family="sans-serif">Azure</text></g>
<g class="badge b11"><rect x="184" y="368" width="68" height="22" rx="6" fill="#0d2b0d" stroke="#4EA94B" stroke-width="0.8"/><text x="218" y="383" text-anchor="middle" font-size="10" fill="#7ED97B" font-family="sans-serif">MongoDB</text></g>
<g class="badge b12"><rect x="258" y="368" width="52" height="22" rx="6" fill="#001528" stroke="#005C84" stroke-width="0.8"/><text x="284" y="383" text-anchor="middle" font-size="10" fill="#4FA8D1" font-family="sans-serif">MySQL</text></g>

<!-- Terminal pill -->
<rect x="318" y="368" width="224" height="22" rx="6" fill="#1c1050" stroke="#7F77DD" stroke-width="0.5" stroke-opacity="0.6"/>
<text x="330" y="383" font-size="10" font-family="monospace" fill="#AFA9EC">
  <tspan fill="#5DCAA5">const</tspan>
  <tspan fill="#AFA9EC"> dev = </tspan>
  <tspan fill="#EF9F27">"Eya"</tspan>
  <tspan fill="#AFA9EC">; </tspan>
  <tspan class="cursor" fill="#7F77DD">█</tspan>
</text>

<line x1="100" y1="402" x2="580" y2="402" stroke="#534AB7" stroke-width="0.5" stroke-opacity="0.5"/>

